name: Release

on:
  push:
    tags:
      - V**

permissions:
  contents: write

jobs:
  release-xpi:
    name: Build and upload XPI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packaged XPI
        run: npm run build

      - name: Verify packaged XPI
        shell: bash
        run: |
          set -euo pipefail
          XPI_PATH=".scaffold/build/sci-pdf.xpi"
          test -s "$XPI_PATH"
          unzip -l "$XPI_PATH" | grep -E "[[:space:]]manifest\.json$"
          unzip -l "$XPI_PATH" | grep -E "[[:space:]]bootstrap\.js$"
          unzip -l "$XPI_PATH" | grep -E "[[:space:]]content/scripts/scipdf\.js$"

      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" \
              --target "${GITHUB_SHA}" \
              --title "${GITHUB_REF_NAME}" \
              --notes "Release ${GITHUB_REF_NAME}"

      - name: Upload XPI to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" ".scaffold/build/sci-pdf.xpi" --clobber
